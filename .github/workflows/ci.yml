name: HFS Continuous Integration

on:
  push:
    branches: [main, develop]
    tags:
      - "v*"
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: 2
  CARGO_PROFILE_DEV_DEBUG: 0
  DOCKER_HOST: ${{ secrets.DOCKER_HOST }}

jobs:
  test-rust:
    name: Test Rust
    runs-on: [self-hosted]
    steps:
      - name: Verify DOCKER_HOST is set
        if: env.DOCKER_HOST == ''
        run: |
          echo "::error::DOCKER_HOST secret is not set. Testcontainers require DOCKER_HOST to connect to Docker."
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Install Rust toolchain (Linux/macOS)
        if: runner.os != 'Windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Configure Rust to use LLD (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          if not exist "%USERPROFILE%\.cargo" mkdir "%USERPROFILE%\.cargo"
          set "configPath=%USERPROFILE%\.cargo\config.toml"
          if exist "%configPath%" del "%configPath%"
          echo [target.x86_64-pc-windows-msvc] >> "%configPath%"
          echo linker = "lld-link.exe" >> "%configPath%"
          echo rustflags = ["-C", "link-arg=/STACK:16777216"] >> "%configPath%"

      - name: Configure Rust to use LLD (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p ~/.cargo
          rm -f ~/.cargo/config.toml
          echo '[target.x86_64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "clang"' >> ~/.cargo/config.toml
          echo 'rustflags = ["-C", "link-arg=-fuse-ld=lld", "-C", "link-arg=-Wl,-zstack-size=8388608"]' >> ~/.cargo/config.toml

      - name: Configure Rust linker (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p ~/.cargo
          rm -f ~/.cargo/config.toml
          echo '[target.aarch64-apple-darwin]' >> ~/.cargo/config.toml
          echo 'linker = "clang"' >> ~/.cargo/config.toml
          echo 'rustflags = ["-C", "link-arg=-Wl,-dead_strip", "-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]' >> ~/.cargo/config.toml

      - name: Run tests with all features
        run: |
          cargo test --workspace --all-features

  cleanup-test-containers:
    name: Cleanup Test Containers
    runs-on: [self-hosted, Linux]
    needs: [test-rust]
    if: always()
    steps:
      - name: Remove testcontainers from this run
        run: |
          docker ps -aq --filter "label=github.run_id=${{ github.run_id }}" | xargs -r docker rm -f || true

  test-python:
    name: Test Python
    runs-on: [self-hosted]
    needs: [test-rust]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Install Rust toolchain (Linux/macOS)
        if: runner.os != 'Windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Configure Rust to use LLD (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          if not exist "%USERPROFILE%\.cargo" mkdir "%USERPROFILE%\.cargo"
          set "configPath=%USERPROFILE%\.cargo\config.toml"
          if exist "%configPath%" del "%configPath%"
          echo [target.x86_64-pc-windows-msvc] >> "%configPath%"
          echo linker = "lld-link.exe" >> "%configPath%"
          echo rustflags = ["-C", "link-arg=/STACK:16777216"] >> "%configPath%"

      - name: Configure Rust to use LLD (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p ~/.cargo
          rm -f ~/.cargo/config.toml
          echo '[target.x86_64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "clang"' >> ~/.cargo/config.toml
          echo 'rustflags = ["-C", "link-arg=-fuse-ld=lld", "-C", "link-arg=-Wl,-zstack-size=8388608"]' >> ~/.cargo/config.toml

      - name: Configure Rust linker (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p ~/.cargo
          rm -f ~/.cargo/config.toml
          echo '[target.aarch64-apple-darwin]' >> ~/.cargo/config.toml
          echo 'linker = "clang"' >> ~/.cargo/config.toml
          echo 'rustflags = ["-C", "link-arg=-Wl,-dead_strip", "-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]' >> ~/.cargo/config.toml

      - name: Build pysof wheel
        working-directory: crates/pysof
        run: uv run maturin develop

      - name: Run tests with coverage
        working-directory: crates/pysof
        run: uv run python -m pytest python-tests/ -v --cov=src --cov-report=xml:coverage.xml --cov-report=term-missing

  lint:
    name: Linting
    runs-on: [self-hosted]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Install Rust toolchain (Linux/macOS)
        if: runner.os != 'Windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Configure Rust to use LLD (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          if not exist "%USERPROFILE%\.cargo" mkdir "%USERPROFILE%\.cargo"
          set "configPath=%USERPROFILE%\.cargo\config.toml"
          if exist "%configPath%" del "%configPath%"
          echo [target.x86_64-pc-windows-msvc] >> "%configPath%"
          echo linker = "lld-link.exe" >> "%configPath%"
          echo rustflags = ["-C", "link-arg=/STACK:16777216"] >> "%configPath%"

      - name: Configure Rust to use LLD (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p ~/.cargo
          rm -f ~/.cargo/config.toml
          echo '[target.x86_64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "clang"' >> ~/.cargo/config.toml
          echo 'rustflags = ["-C", "link-arg=-fuse-ld=lld", "-C", "link-arg=-Wl,-zstack-size=8388608"]' >> ~/.cargo/config.toml

      - name: Configure Rust linker (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p ~/.cargo
          rm -f ~/.cargo/config.toml
          echo '[target.aarch64-apple-darwin]' >> ~/.cargo/config.toml
          echo 'linker = "clang"' >> ~/.cargo/config.toml
          echo 'rustflags = ["-C", "link-arg=-Wl,-dead_strip", "-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]' >> ~/.cargo/config.toml

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: |
          cargo clippy --all-targets --all-features -- -D warnings -A clippy::items_after_test_module -A clippy::large_enum_variant -A clippy::question_mark -A clippy::collapsible_match -A clippy::collapsible_if -A clippy::field_reassign_with_default -A clippy::doc-overindented-list-items -A clippy::doc-lazy-continuation

      - name: Format check
        working-directory: crates/pysof
        run: |
          uv run ruff format --check src

      - name: Lint check
        working-directory: crates/pysof
        run: |
          uv run ruff check src

      - name: Type check
        working-directory: crates/pysof
        run: |
          uv run mypy src

  security:
    name: Security Audit
    runs-on: [self-hosted]
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Install Rust toolchain (Linux/macOS)
        if: runner.os != 'Windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Configure Rust to use LLD (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          if not exist "%USERPROFILE%\.cargo" mkdir "%USERPROFILE%\.cargo"
          set "configPath=%USERPROFILE%\.cargo\config.toml"
          if exist "%configPath%" del "%configPath%"
          echo [target.x86_64-pc-windows-msvc] >> "%configPath%"
          echo linker = "lld-link.exe" >> "%configPath%"
          echo rustflags = ["-C", "link-arg=/STACK:16777216"] >> "%configPath%"

      - name: Configure Rust to use LLD (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p ~/.cargo
          rm -f ~/.cargo/config.toml
          echo '[target.x86_64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "clang"' >> ~/.cargo/config.toml
          echo 'rustflags = ["-C", "link-arg=-fuse-ld=lld", "-C", "link-arg=-Wl,-zstack-size=8388608"]' >> ~/.cargo/config.toml

      - name: Configure Rust linker (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p ~/.cargo
          rm -f ~/.cargo/config.toml
          echo '[target.aarch64-apple-darwin]' >> ~/.cargo/config.toml
          echo 'linker = "clang"' >> ~/.cargo/config.toml
          echo 'rustflags = ["-C", "link-arg=-Wl,-dead_strip", "-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]' >> ~/.cargo/config.toml

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit
 
  coverage:
    name: Code Coverage
    runs-on: [self-hosted, Unix] # llvm-tools-preview has problems on Windows, so restrict to Unix
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Install Rust toolchain (Linux/macOS)
        if: runner.os != 'Windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Configure Rust to use LLD (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          if not exist "%USERPROFILE%\.cargo" mkdir "%USERPROFILE%\.cargo"
          set "configPath=%USERPROFILE%\.cargo\config.toml"
          if exist "%configPath%" del "%configPath%"
          echo [target.x86_64-pc-windows-msvc] >> "%configPath%"
          echo linker = "lld-link.exe" >> "%configPath%"
          echo rustflags = ["-C", "link-arg=/STACK:16777216"] >> "%configPath%"

      - name: Configure Rust to use LLD (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p ~/.cargo
          rm -f ~/.cargo/config.toml
          echo '[target.x86_64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "clang"' >> ~/.cargo/config.toml
          echo 'rustflags = ["-C", "link-arg=-fuse-ld=lld", "-C", "link-arg=-Wl,-zstack-size=8388608"]' >> ~/.cargo/config.toml

      - name: Configure Rust linker (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p ~/.cargo
          rm -f ~/.cargo/config.toml
          echo '[target.aarch64-apple-darwin]' >> ~/.cargo/config.toml
          echo 'linker = "clang"' >> ~/.cargo/config.toml
          echo 'rustflags = ["-C", "link-arg=-Wl,-dead_strip", "-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]' >> ~/.cargo/config.toml

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Generate code coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      # Upload coverage report as artifact
      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: lcov.info
          retention-days: 7

      # Kill stale GPG agents that can cause lock contention on self-hosted runners
      - name: Clean up GPG state
        if: runner.os == 'macOS'
        run: gpgconf --kill all || true

      # Upload to Codecov
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: true

  test-fhirpath:
    name: Test FHIRPath
    runs-on: [self-hosted, Windows]
    needs: [test-rust]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: false
          fetch-depth: 0 # Need full history for change detection

      - name: Download FhirPath Validator
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            console.log('Fetching latest FhirPath Validator release...');

            const { data: release } = await github.rest.repos.getLatestRelease({
              owner: 'HeliosSoftware',
              repo: 'Hl7.Fhir.FhirPath.Validator'
            });

            console.log(`Latest FhirPath Validator release: ${release.tag_name}`);

            // Find the Windows executable archive
            const asset = release.assets.find(asset =>
              asset.name.includes('win-x64') && asset.name.endsWith('.zip')
            );

            if (!asset) {
              console.log('Available assets:', release.assets.map(a => a.name));
              throw new Error('Windows FhirPath validator archive not found');
            }

            console.log(`Downloading FhirPath Validator: ${asset.name}`);

            const { data } = await github.rest.repos.getReleaseAsset({
              owner: 'HeliosSoftware',
              repo: 'Hl7.Fhir.FhirPath.Validator',
              asset_id: asset.id,
              headers: {
                Accept: 'application/octet-stream'
              }
            });

            fs.writeFileSync('fhirpath-validator.zip', Buffer.from(data));
            console.log('FhirPath Validator download completed');

      - name: Checkout FHIR Test Cases
        uses: actions/checkout@v4
        with:
          repository: FHIR/fhir-test-cases
          path: fhir-test-cases
          ref: master

      - name: Extract and Setup FhirPath Validator
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');

            console.log('Extracting FhirPath Validator...');

            // Create directory
            const toolsDir = 'tools/fhirpath-validator';
            fs.mkdirSync(toolsDir, { recursive: true });

            // Extract using tar (available on Windows 10+)
            try {
              execSync(`tar -xf fhirpath-validator.zip -C ${toolsDir}`, { stdio: 'inherit' });
            } catch (error) {
              console.error('Failed to extract with tar, trying alternative method...');
              throw error;
            }

            // Find the executable recursively
            function findFile(dir, filename) {
              const files = fs.readdirSync(dir);
              for (const file of files) {
                const fullPath = path.join(dir, file);
                const stat = fs.statSync(fullPath);
                if (stat.isDirectory()) {
                  const found = findFile(fullPath, filename);
                  if (found) return found;
                } else if (file === filename) {
                  return fullPath;
                }
              }
              return null;
            }

            const validatorPath = findFile(toolsDir, 'Test.Fhir.R5.FhirPath.Validator.exe');

            if (validatorPath) {
              console.log(`Found validator at: ${validatorPath}`);
              
              // Copy to root for easier access
              fs.copyFileSync(validatorPath, 'fhirpath-validator.exe');
              console.log('Validator setup complete');

              // Verify it works
              try {
                execSync('.\\fhirpath-validator.exe --help', { stdio: 'pipe' });
                console.log('Validator help command successful');
              } catch (error) {
                console.log('Validator help not available, but binary extracted');
              }
            } else {
              console.log('Validator executable not found');
              console.log('Directory contents:');
              execSync(`dir /s ${toolsDir}`, { stdio: 'inherit' });
              throw new Error('Validator executable not found');
            }

      - name: Configure Rust to use LLD
        shell: cmd
        run: |
          if not exist "%USERPROFILE%\.cargo" mkdir "%USERPROFILE%\.cargo"
          set "configPath=%USERPROFILE%\.cargo\config.toml"
          if exist "%configPath%" del "%configPath%"
          echo [target.x86_64-pc-windows-msvc] >> "%configPath%"
          echo linker = "lld-link.exe" >> "%configPath%"
          echo rustflags = ["-C", "link-arg=/STACK:16777216"] >> "%configPath%"

      - name: Build fhirpath-server (R5)
        shell: cmd
        run: cargo build -p helios-fhirpath --features R5 --bin fhirpath-server

      # For PS scripts, run with Bypass
      - name: Start fhirpath-server (Windows)
        shell: 'powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -Command "& ''{0}''"'
        run: |
          $exe = Join-Path (Resolve-Path "target\debug").Path "fhirpath-server.exe"
          Write-Host "Starting server: $exe"
          $p = Start-Process -FilePath $exe -ArgumentList "--port 3000 --host 127.0.0.1" -PassThru
          $pidFile = "$env:RUNNER_TEMP\fhirpath_server.pid"
          $p.Id | Out-File -FilePath $pidFile -Encoding ascii
          Write-Host "fhirpath-server PID: $($p.Id)"

      - name: Wait for fhirpath-server to be ready (Windows)
        shell: 'powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -Command "& ''{0}''"'
        run: |
          $deadline = (Get-Date).AddSeconds(30)
          do {
            try {
              $resp = Invoke-RestMethod -Uri http://127.0.0.1:3000/health -UseBasicParsing -TimeoutSec 2
              if ($resp.status -eq 'ok') { Write-Host 'FHIRPath server is ready'; exit 0 }
            } catch { }
            Start-Sleep -Seconds 1
          } while ((Get-Date) -lt $deadline)
          Write-Warning 'FHIRPath server did not become ready in time'

      - name: Create FhirPath Results Directory
        shell: cmd
        run: if not exist fhirpath-results mkdir fhirpath-results

      - name: Run FhirPath Validation with FHIR Test Cases
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const path = require('path');

            console.log('Running FhirPath validation with FHIR R5 test cases...');

            // Get absolute paths
            const testFilePath = path.resolve('fhir-test-cases/r5/fhirpath/tests-fhir-r5.xml');
            const basePath = path.resolve('fhir-test-cases/r5');
            const knownFailuresPath = path.resolve('crates/fhirpath/tests/data/r5/known-test-failures.json');
            const resultsPath = path.resolve('fhirpath-results');
            const url = 'http://127.0.0.1:3000/r5';

            console.log(`Test file path: ${testFilePath}`);
            console.log(`Base path: ${basePath}`);
            console.log(`Known failures file: ${knownFailuresPath}`);
            console.log(`Results path: ${resultsPath}`);
            console.log(`Server URL: ${url}`);

            try {
              // Run the validator as a console application with CLI arguments
              const command = `fhirpath-validator.exe --fhir-test-file "${testFilePath}" --fhir-test-base-path "${basePath}" --known-failures "${knownFailuresPath}" --fhirpath-results-path "${resultsPath}" --url "${url}" --server`;
              console.log(`Executing: ${command}`);
              
              const result = execSync(command, { 
                stdio: 'inherit',
                encoding: 'utf8'
              });
              
              console.log(' All FhirPath validation tests passed (excluding known failures)');
            } catch (error) {
              const exitCode = error.status;
              
              if (exitCode === 1) {
                console.log(' Some FhirPath validation tests failed');
                process.exit(1);
              } else if (exitCode === 2) {
                console.log(' Fatal error occurred during FhirPath validation');
                process.exit(1);
              } else {
                console.log(` Unexpected exit code: ${exitCode}`);
                process.exit(1);
              }
            }

      - name: Upload FhirPath Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fhirpath-test-results
          path: fhirpath-results/
          retention-days: 7

      - name: Cleanup fhirpath-server (Windows)
        if: always()
        shell: 'powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -Command "& ''{0}''"'
        run: |
          $pidFile = "$env:RUNNER_TEMP\fhirpath_server.pid"
          if (Test-Path $pidFile) {
            $serverPid = Get-Content $pidFile | Select-Object -First 1
            Write-Host "Stopping fhirpath-server PID $serverPid"
            Stop-Process -Id $serverPid -Force -ErrorAction SilentlyContinue
            Remove-Item $pidFile -Force -ErrorAction SilentlyContinue
          }

  build:
    name: Build Release
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 1440 
    needs: [coverage, security, test-python, test-fhirpath]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: Linux-x86
            runner: [self-hosted, Linux]
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: Linux-ARM64
            runner: [self-hosted, macOS]
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: Windows
            runner: [self-hosted, Windows]
            target: x86_64-pc-windows-msvc
            archive_ext: zip
          - os: macOS
            runner: [self-hosted, macOS]
            target: aarch64-apple-darwin
            archive_ext: tar.gz
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain (Linux/macOS)
        if: runner.os != 'Windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Configure Rust to use LLD (Windows)
        if: matrix.os == 'Windows'
        shell: cmd
        run: |
          if not exist "%USERPROFILE%\.cargo" mkdir "%USERPROFILE%\.cargo"
          set "configPath=%USERPROFILE%\.cargo\config.toml"
          if exist "%configPath%" del "%configPath%"
          echo [target.x86_64-pc-windows-msvc] >> "%configPath%"
          echo linker = "lld-link.exe" >> "%configPath%"
          echo rustflags = ["-C", "link-arg=/STACK:16777216"] >> "%configPath%"

      - name: Configure Rust to use LLD (Linux x86)
        if: matrix.os == 'Linux-x86'
        run: |
          mkdir -p ~/.cargo
          rm -f ~/.cargo/config.toml
          echo '[target.x86_64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "clang"' >> ~/.cargo/config.toml
          echo 'rustflags = ["-C", "link-arg=-fuse-ld=lld", "-C", "link-arg=-Wl,-zstack-size=8388608"]' >> ~/.cargo/config.toml

      - name: Configure cross-compile linker (Linux ARM64)
        if: matrix.os == 'Linux-ARM64'
        run: |
          mkdir -p ~/.cargo
          rm -f ~/.cargo/config.toml
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-unknown-linux-gnu-gcc"' >> ~/.cargo/config.toml
          echo 'rustflags = ["-C", "link-arg=-fuse-ld=lld"]' >> ~/.cargo/config.toml

      - name: Configure Rust linker (macOS)
        if: matrix.os == 'macOS'
        run: |
          mkdir -p ~/.cargo
          rm -f ~/.cargo/config.toml
          echo '[target.aarch64-apple-darwin]' >> ~/.cargo/config.toml
          echo 'linker = "clang"' >> ~/.cargo/config.toml
          echo 'rustflags = ["-C", "link-arg=-Wl,-dead_strip", "-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]' >> ~/.cargo/config.toml

      - name: Build Release (Windows)
        if: matrix.os == 'Windows'
        shell: cmd
        run: cargo build --workspace --all-features --release

      - name: Build Release (Cross-compile)
        if: matrix.os == 'Linux-ARM64'
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-unknown-linux-gnu-gcc
          PYO3_CROSS_PYTHON_VERSION: "3.14"
        run: cargo build --workspace --all-features --release --target ${{ matrix.target }}

      - name: Build Release (Unix)
        if: matrix.os != 'Windows' && matrix.os != 'Linux-ARM64'
        run: cargo build --workspace --all-features --release

      - name: Upload Rust build artifacts to GitHub
        if: matrix.os != 'Linux-ARM64'
        uses: actions/upload-artifact@v4
        with:
          name: hfs-${{ matrix.target }}
          path: |
            target/release/
            data/
            !target/release/build/
            !target/release/deps/
            !target/release/incremental/
            !target/release/*.d
            !target/release/*.rlib
            !target/release/*.so

      - name: Upload Rust build artifacts to GitHub (Cross-compile)
        if: matrix.os == 'Linux-ARM64'
        uses: actions/upload-artifact@v4
        with:
          name: hfs-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/
            data/
            !target/${{ matrix.target }}/release/build/
            !target/${{ matrix.target }}/release/deps/
            !target/${{ matrix.target }}/release/incremental/
            !target/${{ matrix.target }}/release/*.d
            !target/${{ matrix.target }}/release/*.rlib
            !target/${{ matrix.target }}/release/*.so

      - name: Generate test_report.json file
        if: matrix.os == 'Linux-x86'
        run: cargo test -p helios-sof run_comprehensive_test_suite

      - name: Upload test_report.json to GitHub
        if: matrix.os == 'Linux-x86'
        uses: actions/upload-artifact@v4
        with:
          name: test_report
          path: crates/sof/test_report.json

      - name: Build pysof wheel (Linux with sdist)
        if: matrix.os == 'Linux-x86'
        working-directory: crates/pysof
        run: uv run maturin build --release --sdist -o dist -i python3.10 -i python3.11 -i python3.12 -i python3.13 -i python3.14

      - name: Build pysof wheel (Windows/macOS)
        if: runner.os != 'Linux' && matrix.os != 'Linux-ARM64'
        working-directory: crates/pysof
        run: uv run maturin build --release -o dist -i python3.10 -i python3.11 -i python3.12 -i python3.13 -i python3.14

      - name: Build pysof wheel (Linux ARM64)
        if: matrix.os == 'Linux-ARM64'
        working-directory: crates/pysof
        env:
          PYO3_CROSS_PYTHON_VERSION: "3.14"
        run: uv run maturin build --release -o dist --target aarch64-unknown-linux-gnu -i python3.10 -i python3.11 -i python3.12 -i python3.13 -i python3.14

      - name: Upload pysof artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pysof-${{ matrix.target }}
          path: crates/pysof/dist/*

  publish-pypi:
    name: Publish to PyPI
    runs-on: [self-hosted, Linux]
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all pysof artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pysof-*
          path: ./pysof-dist
          merge-multiple: true

      - name: List artifacts
        run: |
          echo "Files to upload to PyPI:"
          ls -la pysof-dist/

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          export PATH="/home/github/.local/bin:$PATH"
          twine upload --skip-existing pysof-dist/*

  publish-report:
    name: Publish SQL on FHIR test report to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download all pysof artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: test_report
          path: ./downloaded
          merge-multiple: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './downloaded'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    name: Create GitHub Release
    runs-on: [self-hosted, Linux]
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Aggregate pysof wheels and test report
        run: |
          mkdir -p releases/wheels
          # Copy all pysof wheels and sdist (if any)
          find artifacts -type f -name 'pysof-*whl' -exec cp {} releases/wheels/ \; || true
          ls -l releases/wheels || true

      - name: Create release archives
        run: |
          mkdir -p releases
          # Extract version from tag (remove 'v' prefix)
          version="${{ github.ref_name }}"
          version="${version#v}"

          cd artifacts
          for dir in */; do
            # Extract target from directory name (format: hfs-{target}/)
            if [[ "$dir" =~ hfs-(.+)/ ]]; then
              target="${BASH_REMATCH[1]}"
              
              # Create combined archive with version in filename
              if [[ "$target" == *"windows"* ]]; then
                cd "$dir" && zip -r ../../releases/hfs-${version}-${target}.zip . && cd ..
              else
                tar -czf ../releases/hfs-${version}-${target}.tar.gz -C "$dir" .
              fi
            fi
          done

      - name: Generate changelog
        id: changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            # Extract changelog for this version
            sed -n "/^## \[$(echo ${{ github.ref_name }} | sed 's/v//')\]/,/^## \[/p" CHANGELOG.md | head -n -1 > current_changelog.md
            echo "changelog_exists=true" >> $GITHUB_OUTPUT
          else
            echo "## What's Changed" > current_changelog.md
            echo "changelog_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            releases/*
            releases/wheels/*
          body_path: current_changelog.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: ${{ steps.changelog.outputs.changelog_exists == 'false' }}
